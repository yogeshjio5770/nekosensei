name: nihongo_master
description: NekoSensei - Learn Japanese with your cat sensei from zero to JLPT.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  google_sign_in: ^6.3.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI & animations
  flutter_animate: ^4.5.2
  google_fonts: ^6.3.3
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  confetti: ^0.7.0

  # Navigation
  go_router: ^14.8.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  http: ^1.2.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0

  # Audio & Speech
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  vibration: ^3.2.0

  # App Updates
  ota_update: ^4.0.1
  package_info_plus: ^8.1.0

  # PDF & QR
  pdf: ^3.11.1
  printing: ^5.13.4
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  share_plus: ^10.1.3

  # Env
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/nekosensei_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/nekosensei_logo.png"
    background_color: "#ffffff"
    theme_color: "#FF5252"
  windows:
    generate: true
    image_path: "assets/images/nekosensei_logo.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/nekosensei_logo.png
    - assets/audio/
    - assets/audio/native/
    - assets/data/
    - .env
